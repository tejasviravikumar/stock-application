<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="../style/signup.css">
</head>
<body>

    <div class="container">
        <h2 class="primary-text">Create Account</h2>
        <p class="subtitle">
            Start your virtual trading journey today with $100k fake cash
        </p>

        <div class="form-container">
            <form id="signupForm" class="signup-form">

                <label class="secondary-text" for="username">Username</label>
                <input
                    class="inputBox"
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
                    autocomplete="username"
                    required
                >

                <label class="secondary-text" for="email">Email Address</label>
                <input
                    class="inputBox"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required
                >

                <label class="secondary-text" for="password">Password</label>
                <input
                    class="inputBox"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    autocomplete="new-password"
                    required
                >

                <!-- Confirm password (hidden initially, shown by JS) -->
                <div id="confirm-wrapper" class="hidden">
                    <label class="secondary-text" for="confirmPassword">
                        Confirm Password
                    </label>
                    <input
                        class="inputBox"
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                    >
                    <small id="password-msg"></small>
                </div>

                <label class="terms">
                    <input type="checkbox" id="terms">
                    Yes, I agree to the <a>Terms of Service</a>
                </label>

                <button type="submit" class="submit-btn">
                    Create Account
                </button>

                <p>Already have an account?<a href="../pages/signin.html">Sign In</a></p>

            </form>
        </div>
    </div>

    <script src="../script/signup.js"></script>
</body>
</html>
